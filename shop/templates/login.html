<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Swabhiman's Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --card: #1c1c1c;
      --border: rgba(255,255,255,0.08);
      --accent: #f0b429;
      --accent2: #e07b39;
      --text: #f0ede6;
      --muted: #777;
      --input-bg: rgba(255,255,255,0.04);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    /* Subtle radial glow */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(240,180,41,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-wrapper {
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
    }

    .auth-brand {
      text-align: center; margin-bottom: 36px;
    }

    .auth-brand a {
      font-family: 'Playfair Display', serif;
      font-size: 24px; font-weight: 600;
      text-decoration: none; color: var(--text);
    }

    .auth-brand a span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 36px;
    }

    .auth-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 600;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      font-size: 14px; color: var(--muted);
      margin-bottom: 30px;
    }

    /* Django form field styling */
    .auth-card p {
      margin-bottom: 18px;
    }

    .auth-card label {
      display: block;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .auth-card input[type="text"],
    .auth-card input[type="password"],
    .auth-card input[type="email"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 13px 16px;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
      appearance: none;
    }

    .auth-card input:focus {
      border-color: rgba(240,180,41,0.5);
      background: rgba(240,180,41,0.04);
    }

    .auth-card input::placeholder { color: #444; }

    .auth-card ul {
      list-style: none;
      font-size: 12px; color: #e05252;
      margin-top: 6px;
    }

    /* helptext */
    .auth-card .helptext,
    .auth-card span.helptext {
      font-size: 11px; color: var(--muted);
      display: block; margin-top: 5px;
      line-height: 1.5;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 14px;
      padding: 15px;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: 14px; color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none; font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-brand">
    <a href="/">🛍 <span>Swabhiman's</span></a>
  </div>

  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-submit">Sign In →</button>
    </form>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="{% url 'signup' %}">Create one</a>
  </div>
</div>

</body>
</html>
